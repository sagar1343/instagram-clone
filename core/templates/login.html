{% extends 'base.html' %}
{% block content %}
<div class="flex justify-center items-center px-4 py-20">
    <div class="card bg-base-100 shadow-xl w-full max-w-sm">
        <div class="card-body px-8 py-8">
            <div class="text-center mb-8">
                <h2 class="card-title text-2xl justify-center mt-3 text-3xl grand-hotel-regular">Instagram</h2>
                <p class="text-base-content/60 text-sm mt-1">Welcome to instagram community</p>
            </div>
            <form action="{% url 'login-user' %}" class="space-y-4" method="POST" novalidate>
                {% csrf_token %}
                <div>
                    <label for="{{ form.username.id_for_label }}" class="label">{{ form.username.label }}</label>
                    {{ form.username }}

                    <p class="text-xs text-red-500"> {{ form.password.errors.as_text }}</p>
                </div>
                <div>
                    <label for="{{ form.password.id_for_label }}" class="label"> {{ form.password.label }}</label>
                    {{form.password}}
                    <p class="text-xs text-red-500"> {{ form.password.errors.as_text }}</p>
                </div>
                <button type="submit" class="btn bg-blue-500 text-white w-full mt-8">
                    Login
                </button>
            </form>
            <p class="text-sm text-center mt-6 text-base-content/60">
                Don't have an account?
                <a href="{% url 'register-user' %}" class="link text-blue-500 font-medium">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
